; work and carries no license of its own — see the NOTICE in README.md.)
;
; Build:            pio run
; Upload:           pio run -t upload            (add --upload-port /dev/cu.usbmodemXXXX)
; Host checks:      ./test/host/run.sh
;
; Target is an Arduino Mega ADK (ATmega2560): 253,952 B flash, 8,192 B SRAM. Roomy —
; unlike the PSI, this board is nowhere near either ceiling.
;
; Dependencies are derived from what src/main.cpp actually includes: Adafruit NeoPixel
; and Adafruit PWM Servo Driver, plus Wire, which ships with framework-arduino-avr.
; Graham Short's Servos/SlowServo library is vendored in this repo at lib/Servos and is
; picked up automatically — lib/ is PlatformIO's default lib_dir, so no lib_extra_dirs.

[env:FlthyHPs]
platform = atmelavr
board = megaADK
framework = arduino
; src/main.cpp:706 — Serial.begin(9600).
monitor_speed = 9600
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.1

; ---- static analysis:  pio check -e FlthyHPs --------------------------------
; Reports ONLY on src/contract/. Two things make that true, and both are load-bearing:
;
;  1. check_src_filters picks the TRANSLATION UNIT to analyse. The contract layer is
;     header-only, so there is nothing to point clang-tidy AT except the TU that includes
;     it — src/main.cpp. Naming src/contract/ here would analyse zero files.
;  2. --line-filter then picks which files may REPORT. It is a suffix match on the path, so
;     only our two headers survive; every diagnostic from Ryan Sondgeroth's firmware and from
;     Adafruit's libraries is dropped. Without it this run is thousands of warnings of other
;     people's code, which we must not "fix" and which would bury anything real.
;     (--header-filter alone is not enough: clang-tidy ALWAYS reports diagnostics in the main
;     file, i.e. all of main.cpp, whatever the header filter says.)
;
; --target=avr is the entire point of running this at all. clang-tidy defaults to the HOST
; triple, where `int` is 32 bits — under which every AVR integer-promotion/overflow bug in
; this layer is invisible BY CONSTRUCTION, exactly as it is invisible to the host test suite
; (which is also a 32-bit-int build). With --target=avr, clang models the real 16-bit int.
; -mmcu=atmega2560 matches board = megaADK.
;
; The -Wno-* are noise from mixing two toolchains, not findings: PlatformIO passes avr-g++'s
; builtin defines to clang with -D (clang's AVR target defines them itself => redefined), and
; avr-libc's headers carry GCC-only attributes/pragmas clang does not know.
check_tool = clangtidy
check_src_filters =
    +<src/main.cpp>
check_flags =
    clangtidy: --config-file=.clang-tidy --header-filter=src/contract/ --line-filter=[{"name":"src/contract/contract_core.h"},{"name":"src/contract/ContractFlthy.h"}] --extra-arg=--target=avr --extra-arg=-mmcu=atmega2560 --extra-arg=-Wno-macro-redefined --extra-arg=-Wno-unknown-attributes --extra-arg=-Wno-unknown-warning-option --extra-arg=-Wno-ignored-optimization-argument

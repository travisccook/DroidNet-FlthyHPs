;
; Build:            pio run
; Upload:           pio run -t upload            (add --upload-port /dev/cu.usbmodemXXXX)
; Host checks:      ./test/host/run.sh
;
; Target is an Arduino Mega ADK (ATmega2560): 253,952 B flash, 8,192 B SRAM. Roomy —
; unlike the PSI, this board is nowhere near either ceiling.
;
; Dependencies are derived from what src/main.cpp actually includes: Adafruit NeoPixel
; and Adafruit PWM Servo Driver, plus Wire, which ships with framework-arduino-avr.
; Graham Short's Servos/SlowServo library is vendored in this repo at lib/Servos and is
; picked up automatically — lib/ is PlatformIO's default lib_dir, so no lib_extra_dirs.

[env:FlthyHPs]
platform = atmelavr
board = megaADK
framework = arduino
; src/main.cpp:706 — Serial.begin(9600).
monitor_speed = 9600
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.1
